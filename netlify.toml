# Netlify config for Next.js (Draftastic Fantasy)
# https://docs.netlify.com/integrations/frameworks/next-js/
#
# Domains: draftastic-fantasy.netlify.app and draftasticprowrestling.com both serve the same app; hub home is `/`.
# Middleware only forces HTTPS on the custom domain and sets upgrade-insecure-requests.

[build]
  command = "npm run build"
  # Skip the build (and 15-credit deploy) when only docs, supabase SQL, root notes, etc. changed.
  # https://docs.netlify.com/configure-builds/ignore-builds/
  ignore = "bash scripts/netlify-ignore-build.sh"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Trade timer cron: `netlify/functions/process-trade-deadlines.ts` runs every 15m and calls
# GET /api/cron/process-trades with header x-cron-secret. Set CRON_SECRET (and URL) in Netlify env.
# Wrestler stats cache cron: `netlify/functions/recompute-wrestler-stats-cache.ts` runs every 6h and calls
# GET /api/cron/recompute-wrestler-stats-cache with header x-cron-secret.
# Public league registration cron: `netlify/functions/close-public-leagues.ts` runs every 15m and calls
# GET /api/cron/close-public-leagues with header x-cron-secret.

# Force correct MIME type for Next.js CSS (avoids "text/plain" / strict MIME refusal)
[[headers]]
  for = "/*.css"
  [headers.values]
    Content-Type = "text/css"
